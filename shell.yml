---
# shell.yml - Shell script validation: bash -n syntax check + shellcheck lint.
#
# A reusable Taskfile. Consumers pass SCRIPTS as a space-separated list of
# paths relative to the consumer's root Taskfile dir; when omitted, all *.sh
# files are discovered recursively (skipping .git and .devbox). Paths are
# resolved in the consumer's working directory, never this file's location,
# so a remote include works the same as a local one.
#
#   includes:
#     shell:
#       taskfile: "{{if .CI}}https://raw.githubusercontent.com/vtmocanu/task/main/shell.yml{{else}}~/stuff/gitrepos/gh/vtmocanu/task/shell.yml{{end}}"
#       vars:
#         SCRIPTS: my-tool.sh scripts/helper.sh
#
# Then:
#   task shell:syntax    # bash -n on every script
#   task shell:lint      # shellcheck on every script
#   task shell:check     # both

version: "3"

vars:
  # Space-separated script list; empty means "discover all *.sh recursively"
  SCRIPTS: '{{.SCRIPTS | default ""}}'
  # shellcheck severity threshold: error, warning, info, style
  SHELLCHECK_SEVERITY: '{{.SHELLCHECK_SEVERITY | default "warning"}}'
  # extra shellcheck flags; -x follows sourced files
  SHELLCHECK_FLAGS: '{{.SHELLCHECK_FLAGS | default "-x"}}'

tasks:
  syntax:
    desc: "bash -n syntax check on shell scripts"
    cmds:
      - |
        set -e
        scripts="{{.SCRIPTS}}"
        if [ -z "$scripts" ]; then
          scripts=$(find . \( -path ./.git -o -path ./.devbox \) -prune -o -name '*.sh' -type f -print)
        fi
        for f in $scripts; do
          [ -f "$f" ] || { echo "missing script: $f" >&2; exit 1; }
          echo "==> bash -n $f"
          bash -n "$f"
        done

  lint:
    desc: "shellcheck lint on shell scripts"
    preconditions:
      - sh: command -v shellcheck
        msg: "shellcheck must be installed"
    cmds:
      - |
        set -e
        scripts="{{.SCRIPTS}}"
        if [ -z "$scripts" ]; then
          scripts=$(find . \( -path ./.git -o -path ./.devbox \) -prune -o -name '*.sh' -type f -print)
        fi
        for f in $scripts; do
          [ -f "$f" ] || { echo "missing script: $f" >&2; exit 1; }
          echo "==> shellcheck $f"
          shellcheck {{.SHELLCHECK_FLAGS}} -S {{.SHELLCHECK_SEVERITY}} "$f"
        done

  check:
    desc: "Full shell validation (syntax + lint)"
    cmds:
      - task: syntax
      - task: lint
